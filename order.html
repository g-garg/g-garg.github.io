<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<title>Order Book</title>

<link rel="stylesheet" href="assets/css/style.css">

</head>

<body>

<h1>Book Order</h1>

<form id="orderForm">

<input
type="text"
name="name"
placeholder="Full Name"
required>

<input
type="email"
name="email"
placeholder="Email"
required>

<input
type="text"
name="phone"
placeholder="Phone"
required>

<textarea
name="address"
placeholder="Address"
required>
</textarea>

<input
type="text"
name="city"
placeholder="City"
required>

<input
type="text"
name="state"
placeholder="State"
required>

<input
type="text"
name="pincode"
placeholder="Pincode"
required>

<input
type="number"
name="quantity"
value="1"
min="1">

<!-- ADD UPI TRANSACTION ID HERE -->

<input
type="text"
name="transaction"
placeholder="UPI Transaction ID"
required>

<button>

Place Order

</button>

</form>

<script src="assets/js/app.js"></script>

</body>

</html>
